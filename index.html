<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="texto">
        <p> BUSCA DE POKÉMON</p>
    </div>
    <div class="caixa-pesquisa">
        <input class="pesquisar" type="text" id="CampoDeBusca" placeholder="Digite o nome do pokemon">
        <button class="btn-pesquisar">Pesquisar</button>
    </div>

    <div id="resultado" class="container-box">
        <div class="card-body">
            <img id="pokeImg" src="" alt="Sprite do pokémon" class="img-pokemon">
            <h3 id="pokenome" class="Text-pokenome"></h3>
            <p class="info-pokemon"><strong>ID:</strong> <span id="pokeID"></span></p>
            <p class="info-pokemon"><strong>Altura:</strong> <span id="pokeAltura"></span> </p>
            <p class="info-pokemon"><strong>Peso:</strong> <span id="pokePeso"></span></p>
            <p class="info-pokemon"><Strong>Tipo:</Strong> <span id="pokeTipo"></span></p>
        </div>
    </div>

    <div id="msgErro" class="alert">
        Pokémon não encontrado. Tente novamente!
    </div>
</body>
</html>
